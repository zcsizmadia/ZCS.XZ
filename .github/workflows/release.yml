name: Release

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel releases in progress

jobs:
  release:
    runs-on: ubuntu-latest
    # This ensures the job only runs if the tag was created from the main branch
    if: github.event.release.target_commitish == 'main' || github.ref == 'refs/heads/main'
    permissions:
      actions: read     # To download from build.yml
      contents: write   # To upload assets to the Release
      packages: write   # To push to GitHub Packages

    steps:
      - uses: actions/checkout@v6

      - name: Install .NET SDKs
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x

      - name: Download nupkg from build workflow
        uses: dawidd6/action-download-artifact@v20
        with:
          workflow: build.yml
          workflow_conclusion: success
          branch: main             # Strictly target the main branch
          name: nuget-package
          path: ./nupkgs
          check_artifacts: true    # Ensures the workflow actually has the named artifact
          search_artifacts: true   # Finds the latest run that actually contains this artifact

      - name: Check nupkg version
        shell: bash
        run: |
          # Get version from the tag (stripping 'v' prefix if present)
          TAG_VERSION="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          
          echo "Validating version: $TAG_VERSION"

          # Extract version from csproj
          PROJECT_VERSION="$(dotnet msbuild ZCS.XZ/ZCS.XZ.csproj -getProperty:Version -nologo -v:q | tr -d '\r' | xargs)"

          # Check if the tag version matches the project version
          if [[ "$TAG_VERSION" != "$PROJECT_VERSION" ]]; then
            echo "::error::Version mismatch! Tag ($TAG_VERSION) != Project ($PROJECT_VERSION)"
            exit 1
          fi

          # Path to the specific nupkg we want
          TARGET_NUPKG="./nupkgs/ZCS.XZ.$TAG_VERSION.nupkg"

          # Verify the file exists with that version
          if [[ ! -f "$TARGET_NUPKG" ]]; then
            echo "::error::Could not find nupkg for version $TAG_VERSION in downloaded artifacts"
            exit 1
          fi

          # Export variables for later steps
          echo "TARGET_NUPKG=$TARGET_NUPKG" >> $GITHUB_ENV

      - name: Attach Assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} "$TARGET_NUPKG"

      - name: Publish to NuGet.org
        shell: bash
        run: |
          dotnet nuget push "$TARGET_NUPKG" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push "$TARGET_NUPKG" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --skip-duplicate
