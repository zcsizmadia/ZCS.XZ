name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
     

jobs:
  build-liblzma:
    strategy:
      max-parallel: 1
      matrix:
        platform: [linux-x64, windows-x64] #, windows-x86, macos-arm64, macos-x64]
        include:
          - platform: linux-x64
            os: ubuntu-latest
            triplet: x64-linux-dynamic
            lib_file: lib/liblzma.so

          - platform: windows-x64
            os: windows-latest
            triplet: x64-windows
            lib_file: bin/liblzma.dll

          # - platform: windows-x86
          #   os: windows-latest
          #   triplet: x86-windows
          #   lib_file: bin/liblzma.dll

          # - platform: macos-arm64
          #   os: macos-latest
          #   triplet: arm64-osx-dynamic
          #   lib_file: lib/liblzma.dylib

          # - platform: macos-x64
          #   os: macos-latest
          #   triplet: x64-osx-dynamic
          #   lib_file: lib/liblzma.dylib

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install vcpkg
        uses: lukka/run-vcpkg@v11 # microsoft/vcpkg-action@v2
        with:
          vcpkgGitCommitId: "81e3c888ef717a026eb57bb2f3cb0dbd30246271"

      - name: Install liblzma
        shell: bash
        run: |
          vcpkg install liblzma --triplet=${{ matrix.triplet }}
          find vcpkg/installed/${{ matrix.triplet }}

      - name: Copy liblzma to Output Directory
        shell: bash
        run: |
            mkdir -p ZCS.XZ/target/release/${{ matrix.triplet }}
            cp -L vcpkg/installed/${{ matrix.triplet }}/${{ matrix.lib_file }} ZCS.XZ/target/release/${{ matrix.triplet }}/
            ls -l ZCS.XZ/target/release/${{ matrix.triplet }}/
     
      - name: Upload Library
        uses: actions/upload-artifact@v4
        with:
          name: native-lib-${{ matrix.platform }}
          path: ZCS.XZ/target/release/${{ matrix.triplet }}

  build-nuget:
    needs: [build-liblzma]
    runs-on: ubuntu-latest
    if: always() && needs.build-liblzma.result == 'success'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Download Linux Library
        uses: actions/download-artifact@v4
        with:
          name: native-lib-linux-x64
          path: ZCS.XZ/target/release/linux-x64
      
      - name: Download Windows x64 Library
        uses: actions/download-artifact@v4
        with:
          name: native-lib-windows-x64
          path: ZCS.XZ/target/release/windows-x64
      
  #     - name: Download Windows x86 Library
  #       uses: actions/download-artifact@v4
  #       with:
  #         name: native-lib-windows-x86
  #         path: ZCS.XZ/target/release/windows-x86
      
  #     - name: Download macOS ARM64 Library
  #       uses: actions/download-artifact@v4
  #       with:
  #         name: native-lib-macos-arm64
  #         path: ZCS.XZ/target/release/osx-arm64
      - name: Build
        shell: bash
        run: |
          ls -lR ZCS.XZ/target/release/
      