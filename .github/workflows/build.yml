name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
      
permissions:
  contents: write
  packages: write

jobs:
  build-liblzma:
    strategy:
      matrix:
        platform: [linux-x64, windows-x64, windows-x86, macos-arm64, macos-x64]
        include:
          - platform: linux-x64
            os: ubuntu-latest
            triplet: x64-linux

          - platform: windows-x64
            os: windows-latest
            triplet: x64-windows

          - platform: windows-x86
            os: windows-latest
            triplet: x86-windows

          - platform: macos-arm64
            os: macos-latest
            triplet: arm64-osx

          - platform: macos-x64
            os: macos-latest
            triplet: x64-osx

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install vcpkg
        uses: microsoft/vcpkg-action@v2
        with:
          # optional but recommended (pins vcpkg for reproducible builds)
          # vcpkgGitCommitId: "<a known good commit sha>"
          triplet: ${{ matrix.triplet }}

      - name: Install dependencies
        shell: bash
        run: |
          vcpkg install liblzma:${{ matrix.triplet }} --no-binarycaching
      
