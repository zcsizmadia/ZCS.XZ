name: Build and Release

on:
  push:
    tags:
      - 'v*'
      
permissions:
  contents: write
  packages: write

jobs:
  build-liblzma:
    strategy:
      matrix:
        platform: [linux-x64, windows-x64, windows-x86, macos-arm64]
        include:
          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib_name: liblzma.so
            output_dir: linux-x64

          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            lib_name: liblzma.dll
            output_dir: windows-x64

          - platform: windows-x86
            os: windows-latest
            target: i686-pc-windows-msvc
            lib_name: liblzma.dll
            output_dir: windows-x86

          - platform: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            lib_name: liblzma.dylib
            output_dir: osx-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install VCPkg
        uses: microsoft/vcpkg-action@v2
        with:
          target: ${{ matrix.target }}
      
      # - name: Install .NET SDK
      #   uses: actions/setup-dotnet@v4
      #   with:
      #     dotnet-version: '8.0.x'
      
      - name: Build liblzma Library
        shell: bash
        run: |
          vcpkg install liblzma --no-binarycaching
      
