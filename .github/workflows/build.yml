name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  build-liblzma:
    strategy:
      max-parallel: 1
      matrix:
        platform: [linux-x64, linux-arm64, windows-x64, windows-arm64, macos-x64, macos-arm64]
        include:
          - platform: linux-x64
            os: ubuntu-latest
            cmake_args: ""
            lib_file: liblzma.so
            exe_file: tools/liblzma/xz
            runtime_arch: linux-x64

          - platform: linux-arm64
            os: ubuntu-24.04-arm
            cmake_args: ""
            lib_file: liblzma.so
            exe_file: tools/liblzma/xz
            runtime_arch: linux-arm64

          - platform: windows-x64
            os: windows-latest
            cmake_args: "-A x64"
            lib_file: liblzma.dll
            exe_file: tools/liblzma/xz.exe
            runtime_arch: win-x64

          - platform: windows-arm64
            os: windows-11-arm
            cmake_args: "-A ARM64"
            lib_file: liblzma.dll
            exe_file: tools/liblzma/xz.exe
            runtime_arch: win-arm64

          - platform: macos-x64
            os: macos-latest
            cmake_args: "-DCMAKE_OSX_ARCHITECTURES=x86_64"
            lib_file: liblzma.dylib
            exe_file: tools/liblzma/xz
            runtime_arch: osx-x64

          - platform: macos-arm64
            os: macos-latest
            cmake_args: "-DCMAKE_OSX_ARCHITECTURES=arm64"
            lib_file: liblzma.dylib
            exe_file: tools/liblzma/xz
            runtime_arch: osx-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Build liblzma
        shell: bash
        run: |
          XZ_VERSION=$(sed -n 's/.*<LibLzmaVersion>\(.*\)<\/LibLzmaVersion>.*/\1/p' Directory.Build.props | tr -d '[:space:]')
          XZ_URL="https://github.com/tukaani-project/xz/releases/download/v$XZ_VERSION/xz-$XZ_VERSION.tar.gz"
          echo "Building liblzma version $XZ_VERSION from $XZ_URL"
          curl -sL $XZ_URL | tar xz
          mkdir xz-build xz-install
          cmake -S xz-$XZ_VERSION -B xz-build \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/xz-install \
              -DBUILD_SHARED_LIBS=ON ${{ matrix.cmake_args }}
          cmake --build xz-build --config Release
          cmake --install xz-build --config Release
        
          find xz-install || true
          xz-install/bin/xz --version

      - name: Copy to runtimes
        shell: bash
        run: |
          mkdir -p ZCS.XZ/runtimes/${{ matrix.runtime_arch }}/native
          cp -L xz-install/lib/${{ matrix.lib_file }} ZCS.XZ/runtimes/${{ matrix.runtime_arch }}/native/

      - name: Build and test
        shell: bash
        run: |
          dotnet restore
          dotnet build -c Release --no-restore
          dotnet test -c Release --no-build 

      - name: Upload native library artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-lib-${{ matrix.platform }}
          path: ZCS.XZ/runtimes

  build-nuget:
    needs: [build-liblzma]
    runs-on: ubuntu-latest
    if: always() && needs.build-liblzma.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Install .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Download all native library artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-lib-*
          path: ZCS.XZ/runtimes
          merge-multiple: true

      - name: Pack NuGet package
        run: dotnet pack ZCS.XZ/ZCS.XZ.csproj -c Release -o nupkg

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: nupkg/*.nupkg

      # Publish to NuGet.org only on release events
      - name: Publish to NuGet.org
        if: github.event_name == 'release'
        run: dotnet nuget push nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
