name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-liblzma:
    strategy:
      fail-fast: false
      matrix: &platforms-matrix
        runtimeId: [linux-x64, linux-arm64, win-x64, win-arm64, osx-x64, osx-arm64]
        include:
          - runtimeId: linux-x64
            os: ubuntu-latest
            libFile: lib/liblzma.so

          - runtimeId: linux-arm64
            os: ubuntu-24.04-arm
            libFile: lib/liblzma.so

          - runtimeId: win-x64
            os: windows-latest
            libFile: bin/liblzma.dll

          - runtimeId: win-arm64
            os: windows-11-arm
            libFile: bin/liblzma.dll

          - runtimeId: osx-x64
            os: macos-latest
            libFile: lib/liblzma.dylib

          - runtimeId: osx-arm64
            os: macos-latest
            libFile: lib/liblzma.dylib

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/buildLibLzma
        with:
          runtimeId: ${{ matrix.runtimeId }}
          libFile: ${{ matrix.libFile }}

  build-liblzma-musl:
    strategy:
      fail-fast: false
      matrix: &platforms-matrix-musl
        runtimeId: [linux-musl-x64, linux-musl-arm64]
        include:
          - runtimeId: linux-musl-x64
            os: ubuntu-latest
            libFile: lib/liblzma.so

          - runtimeId: linux-musl-arm64
            os: ubuntu-24.04-arm
            libFile: lib/liblzma.so

    runs-on: ${{ matrix.os }}
    container: alpine:latest
    steps:
      # action/checkout fails on Alpine Arm64 without this fix
      - name: Fix Alpine arm64 compatibility
        if: matrix.runtimeId == 'linux-musl-arm64'
        uses: laverdet/alpine-arm64@v1

      - uses: actions/checkout@v6

      - uses: ./.github/actions/buildLibLzma
        with:
          runtimeId: ${{ matrix.runtimeId }}
          libFile: ${{ matrix.libFile }}

  build-nupkg:
    needs: [build-liblzma, build-liblzma-musl]
    runs-on: ubuntu-latest
    if: always() && needs.build-liblzma.result == 'success' && needs.build-liblzma-musl.result == 'success'
    steps:
      - uses: actions/checkout@v6

      - name: Install .NET SDKs
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Download all native library artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: native-lib-*
          path: ZCS.XZ/runtimes
          merge-multiple: true

      - name: Pack NuGet package
        run: dotnet pack ZCS.XZ/ZCS.XZ.csproj -c Release -o nupkgs

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: nupkgs/*.nupkg

  validate-nupkg:
    needs: [build-nupkg]
    if: always() && needs.build-nupkg.result == 'success'
    strategy:
      fail-fast: false
      matrix: *platforms-matrix

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/validateNuPkg

  validate-nupkg-musl:
    needs: [build-nupkg]
    if: always() && needs.build-nupkg.result == 'success'
    strategy:
      fail-fast: false
      matrix: *platforms-matrix-musl

    runs-on: ${{ matrix.os }}
    container: alpine:latest
    steps:
      # action/checkout fails on Alpine Arm64 without this fix
      - name: Fix Alpine arm64 compatibility
        if: matrix.runtimeId == 'linux-musl-arm64'
        uses: laverdet/alpine-arm64@v1

      - uses: actions/checkout@v6

      - uses: ./.github/actions/validateNuPkg
